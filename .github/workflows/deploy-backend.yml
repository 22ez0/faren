name: Deploy Backend → Render

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Accept: application/json" | jq .
