name: Deploy Backend → Render

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/api-server/**'
      - 'lib/**'
      - 'pnpm-lock.yaml'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Render auto-deploy triggered
        run: |
          echo "Render is connected to this repo and auto-deploys on push to main."
          echo "Service: https://faren-api-wn1z.onrender.com"
          echo "No additional step required."
